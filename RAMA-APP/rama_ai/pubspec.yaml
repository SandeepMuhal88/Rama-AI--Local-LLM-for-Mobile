publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  ffi: ^2.1.0
  path_provider: ^2.1.2
  dio: ^5.4.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true