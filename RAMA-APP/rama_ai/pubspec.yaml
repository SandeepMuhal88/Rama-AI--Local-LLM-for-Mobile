name: rama_ai
description: "RAMA AI — 100% offline on-device LLM chatbot for Android"
publish_to: 'none'

version: 1.2.0+3

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  ffi: ^2.1.0
  path_provider: ^2.1.2
  dio: ^5.4.0
  permission_handler: ^11.3.1
  shared_preferences: ^2.3.2
  file_picker: ^8.1.2
  sqflite: ^2.3.3
  path: ^1.9.0
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/app_icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#0D0D1A"
  adaptive_icon_foreground: "assets/icon/app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/